name: Build Android APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    name: Generate APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Mobile Dependencies
        working-directory: ./mobile
        run: npm ci --legacy-peer-deps

      - name: Verify Mobile Assets
        working-directory: ./mobile
        run: npm run verify:assets

      - name: Set Android Build Metadata
        working-directory: ./mobile
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')); app.expo.android = { ...(app.expo.android || {}), versionCode: Number(process.env.BUILD_NUMBER || app.expo.android?.versionCode || 1) }; fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');"
          echo "APP_VERSION=$(node -p \"require('./app.json').expo.version\")" >> $GITHUB_ENV

      - name: Prebuild Android (Expo)
        working-directory: ./mobile
        run: npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build Android APK
        working-directory: ./mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK Artifact
        run: |
          cp "mobile/android/app/build/outputs/apk/release/app-release.apk" "mobile/android/app/build/outputs/apk/release/sos-controle-mobile-v${APP_VERSION}-build-${{ github.run_number }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sos-controle-mobile-v${{ env.APP_VERSION }}-build-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/sos-controle-mobile-v${{ env.APP_VERSION }}-build-${{ github.run_number }}.apk
