name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Generate APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Application
        env:
          VITE_API_URL: https://controles.pages.dev
        run: npm run build

      - name: Generate Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          if [ -d "assets" ] && [ -f "assets/icon.png" ]; then
            npm install -g @capacitor/assets
            npx @capacitor/assets generate --android
          fi

      - name: Set Android App Version
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle

      - name: Build Android APK
        working-directory: ./android
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.2.1
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
